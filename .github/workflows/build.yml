name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      app:
        description: "App to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - prodss-process
          - dendy-process
          - new-app
      release_tag:
        description: "Optional release tag (example: v1.0.2-prodss-process)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  select-apps:
    runs-on: windows-latest
    outputs:
      apps_json: ${{ steps.select.outputs.apps_json }}
      has_apps: ${{ steps.select.outputs.has_apps }}
      release_tag: ${{ steps.select.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select apps to build
        id: select
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          all_apps = ["prodss-process", "dendy-process", "new-app"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          ref = os.environ.get("GITHUB_REF", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          after = os.environ.get("GITHUB_SHA", "")
          dispatch_app = os.environ.get("DISPATCH_APP", "all")
          dispatch_release_tag = os.environ.get("DISPATCH_RELEASE_TAG", "").strip()

          apps = []

          if ref.startswith("refs/tags/"):
              tag_body = ref_name[1:] if ref_name.startswith("v") else ref_name
              selected = None
              for app in all_apps:
                  if tag_body.endswith(f"-{app}"):
                      selected = app
                      break
              apps = [selected] if selected else list(all_apps)
          elif event_name == "workflow_dispatch":
              apps = list(all_apps) if dispatch_app == "all" else [dispatch_app]
          elif event_name == "push":
              if before and set(before) == {"0"}:
                  apps = list(all_apps)
              else:
                  try:
                      output = subprocess.check_output(
                          ["git", "diff", "--name-only", before, after],
                          text=True,
                      )
                      changed_files = [line.strip() for line in output.splitlines() if line.strip()]
                  except Exception:
                      changed_files = []

                  global_change = any(
                      path.startswith("shared/")
                      or path == "pyproject.toml"
                      or path == "requirements.txt"
                      for path in changed_files
                  )

                  if global_change:
                      apps = list(all_apps)
                  else:
                      apps = [
                          app for app in all_apps
                          if any(path.startswith(f"apps/{app}/") for path in changed_files)
                      ]

          has_apps = "true" if apps else "false"
          apps_json = json.dumps(apps)

          print(f"event={event_name} ref={ref} apps={apps}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"apps_json={apps_json}\n")
              fh.write(f"has_apps={has_apps}\n")
              fh.write(f"release_tag={dispatch_release_tag}\n")
          PY
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          DISPATCH_APP: ${{ inputs.app || 'all' }}
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag || '' }}

  build:
    needs: select-apps
    if: needs.select-apps.outputs.has_apps == 'true'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.select-apps.outputs.apps_json) }}

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/${{ matrix.app }}/requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller apps/${{ matrix.app }}/build.spec --noconfirm --clean

      - name: Package build output
        shell: bash
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          app = os.environ["APP_NAME"]
          os_name = os.environ["RUNNER_OS"]
          dist_dir = Path("dist") / app
          archive_base = Path("dist") / f"{app}-{os_name}"

          if not dist_dir.exists():
              raise SystemExit(f"Missing build output: {dist_dir}")

          archive_path = shutil.make_archive(str(archive_base), "zip", root_dir=str(dist_dir))
          print(f"Created {archive_path}")
          PY
        env:
          APP_NAME: ${{ matrix.app }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ runner.os }}
          path: dist/${{ matrix.app }}-${{ runner.os }}.zip
          retention-days: 5

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v') || needs.select-apps.outputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.app }}-*.zip
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.select-apps.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
